[advisories]
version = 2
ignore = [
    # rsa crate Marvin Attack (PKCS#1 v1.5 decryption timing side-channel).
    # We only use rsa for key generation, never for decryption — not exploitable.
    "RUSTSEC-2023-0071",
    # atomic-polyfill unmaintained — transitive dep from postcard → heapless 0.7.
    # No fix available without switching serializers. postcard 1.x is the latest.
    "RUSTSEC-2023-0089",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
