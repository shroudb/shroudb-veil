# ─── Indexing ─────────────────────────────────────────────────────────────────

[commands.index]
verb = "INDEX"
description = "Encrypt plaintext and generate convergent search tokens"
replica_behavior = "WriteOnly"
params = [
    { name = "keyring", type = "keyring", required = true, position = 1, description = "Transit keyring name" },
    { name = "plaintext", type = "plaintext", required = true, position = 2, description = "Base64-encoded plaintext to index" },
    { name = "field", type = "string", required = false, key = "FIELD", description = "JSON field scope for tokenization" },
    { name = "context", type = "string", required = false, key = "CONTEXT", description = "AAD for encryption" },
]
response = [
    { name = "ciphertext", type = "ciphertext", description = "Encrypted plaintext (non-deterministic)" },
    { name = "key_version", type = "key_version", description = "Key version used for encryption" },
    { name = "tokens", type = "array", description = "Convergent-encrypted search tokens" },
]
errors = [
    { code = "BADARG", condition = "Invalid plaintext encoding" },
    { code = "TRANSIT", condition = "Transit encrypt failed" },
]

# ─── Administrative ───────────────────────────────────────────────────────────

[commands.health]
verb = "HEALTH"
description = "Check server and Transit backend health"
replica_behavior = "PureRead"
simple_response = true
params = []
response = [
    { name = "state", type = "string", description = "Server state (ready, starting, etc.)" },
    { name = "transit", type = "string", description = "Transit backend state" },
]

[commands.auth]
verb = "AUTH"
description = "Authenticate the connection"
replica_behavior = "PureRead"
params = [
    { name = "token", type = "string", required = true, position = 1, description = "Bearer token" },
]
response = [
    { name = "status", type = "string", description = "OK on success" },
]
errors = [
    { code = "DENIED", condition = "Invalid or expired token" },
]

[commands.config_get]
verb = "CONFIG"
variant = "GET"
description = "Read a runtime configuration value"
replica_behavior = "PureRead"
params = [
    { name = "key", type = "string", required = true, position = 1, description = "Config key (e.g. search.max_batch_size)" },
]
response = [
    { name = "value", type = "string", description = "Current config value" },
    { name = "source", type = "string", description = "Config source (runtime)" },
]
errors = [
    { code = "BADARG", condition = "Unknown config key" },
]

[commands.config_set]
verb = "CONFIG"
variant = "SET"
description = "Set a runtime configuration value (in-memory only)"
replica_behavior = "WriteOnly"
params = [
    { name = "key", type = "string", required = true, position = 1, description = "Config key" },
    { name = "value", type = "string", required = true, position = 2, description = "New value" },
]
response = [
    { name = "status", type = "string", description = "OK on success" },
]
errors = [
    { code = "BADARG", condition = "Unknown or immutable config key" },
]

[commands.config_list]
verb = "CONFIG"
variant = "LIST"
description = "List all configuration keys and values"
replica_behavior = "PureRead"
params = []
response = [
    { name = "entries", type = "array", description = "Config entries with value, source, and mutable fields" },
]
