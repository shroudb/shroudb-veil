[protocol]
name = "veil"
description = "Searchable encryption with blind indexing"
version = "1.1.0"
default_tcp_port = 6799
uri_scheme = "shroudb-veil"

# ── HTTP API ────────────────────────────────────────────────────────
# Optional HTTP interface (Axum). Enabled via `server.http_bind` config
# or `--http-bind` / `VEIL_HTTP_BIND` env var.

[http]
description = "REST-style HTTP API for non-Rust integrations"

[http.endpoints.index_create]
method = "POST"
path = "/index/create"
body = { fields = ["name"] }
acl = "admin"
maps_to = "INDEX CREATE"

[http.endpoints.index_destroy]
method = "POST"
path = "/index/destroy"
body = { fields = ["name"] }
acl = "admin"
maps_to = "INDEX DESTROY"

[http.endpoints.index_rotate]
method = "POST"
path = "/index/rotate"
body = { fields = ["name"] }
acl = "admin"
maps_to = "INDEX ROTATE"

[http.endpoints.index_reindex]
method = "POST"
path = "/index/reindex"
body = { fields = ["name"] }
acl = "admin"
maps_to = "INDEX REINDEX"

[http.endpoints.index_reconcile]
method = "POST"
path = "/index/reconcile"
body = { fields = ["name", "valid_ids"] }
acl = "admin"
maps_to = "INDEX RECONCILE"

[http.endpoints.index_info]
method = "GET"
path = "/index/info"
query = { fields = ["name"] }
acl = "namespace:read"
maps_to = "INDEX INFO"

[http.endpoints.index_list]
method = "GET"
path = "/index/list"
acl = "none"
maps_to = "INDEX LIST"

[http.endpoints.put]
method = "POST"
path = "/put"
body = { fields = ["index", "entry_id", "data", "field?", "blind?"] }
acl = "namespace:write"
maps_to = "PUT"

[http.endpoints.delete]
method = "DELETE"
path = "/entry"
query = { fields = ["index", "entry_id"] }
acl = "namespace:write"
maps_to = "DELETE"

[http.endpoints.search]
method = "GET"
path = "/search"
query = { fields = ["index", "query", "mode?", "field?", "limit?", "blind?"] }
acl = "namespace:read"
maps_to = "SEARCH"

[http.endpoints.tokenize]
method = "POST"
path = "/tokenize"
body = { fields = ["index", "data", "field?"] }
acl = "namespace:read"
maps_to = "TOKENIZE"

[http.endpoints.health]
method = "GET"
path = "/health"
acl = "none"
maps_to = "HEALTH"

[errors]
DENIED = { http = 401, description = "Authentication or authorization failure" }
NOTFOUND = { http = 404, description = "Index or entry not found" }
EXISTS = { http = 409, description = "Index already exists" }
BADARG = { http = 400, description = "Invalid argument or syntax" }
INTERNAL = { http = 500, description = "Internal server error" }

# ── Index Management ─────────────────────────────────────────────

[commands.INDEX_CREATE]
syntax = "INDEX CREATE <name>"
description = "Create a new blind index with a fresh HMAC key"
acl = "admin"
parameters = [
    { name = "name", type = "string", required = true, description = "Index name (alphanumeric, hyphens, underscores)" },
]
response = { fields = ["status", "index", "created_at", "tokenizer_version"] }
errors = ["EXISTS", "BADARG"]

[commands.INDEX_LIST]
syntax = "INDEX LIST"
description = "List all blind index names"
acl = "none"
response = { type = "array", items = "string" }

[commands.INDEX_INFO]
syntax = "INDEX INFO <name>"
description = "Get information about a blind index"
acl = "namespace:read"
parameters = [
    { name = "name", type = "string", required = true },
]
response = { fields = ["index", "created_at", "entry_count", "tokenizer_version"] }
errors = ["NOTFOUND"]

[commands.INDEX_ROTATE]
syntax = "INDEX ROTATE <name>"
description = "Rotate an index's HMAC key. Generates a new key, deletes all existing entries. The application must re-index all entries after rotation."
acl = "admin"
parameters = [
    { name = "name", type = "string", required = true, description = "Index name" },
]
response = { fields = ["status", "index", "rotated_at", "entry_count"] }
errors = ["NOTFOUND"]

[commands.INDEX_DESTROY]
syntax = "INDEX DESTROY <name>"
description = "Crypto-shred an index: zeroize the HMAC key, delete all entries, and remove the index. After destruction, the index name can be reused."
acl = "admin"
parameters = [
    { name = "name", type = "string", required = true, description = "Index name" },
]
response = { fields = ["status", "index", "deleted_entries"] }
errors = ["NOTFOUND"]

[commands.INDEX_REINDEX]
syntax = "INDEX REINDEX <name>"
description = "Clear all entries and update the tokenizer version to current. The HMAC key is preserved. After reindex, the application must re-submit all entries via PUT. Use this when the tokenizer algorithm has been upgraded."
acl = "admin"
parameters = [
    { name = "name", type = "string", required = true, description = "Index name" },
]
response = { fields = ["status", "index", "tokenizer_version", "entries_cleared"] }
errors = ["NOTFOUND"]

[commands.INDEX_RECONCILE]
syntax = "INDEX RECONCILE <name> <id1> [id2 ...]"
description = "Remove orphaned entries from the index. Compares stored entry IDs against the provided valid set and deletes any entries not in the set."
acl = "admin"
parameters = [
    { name = "name", type = "string", required = true, description = "Index name" },
    { name = "valid_ids", type = "string[]", required = true, description = "Authoritative list of valid entry IDs" },
]
response = { fields = ["status", "index", "orphans_removed"] }
errors = ["NOTFOUND"]

# ── Token Operations ─────────────────────────────────────────────

[commands.TOKENIZE]
syntax = "TOKENIZE <index> <plaintext_b64> [FIELD <name>]"
description = "Generate blind tokens from plaintext without storing. Returns HMAC-derived tokens for external use."
acl = "namespace:read"
parameters = [
    { name = "index", type = "string", required = true, description = "Index name" },
    { name = "plaintext_b64", type = "string", required = true, description = "Base64-encoded plaintext to tokenize" },
    { name = "field", type = "string", required = false, description = "JSON field to extract for tokenization" },
]
response = { fields = ["status", "words", "trigrams", "tokens"] }
errors = ["NOTFOUND", "BADARG"]

# ── Entry Operations ─────────────────────────────────────────────

[commands.PUT]
syntax = "PUT <index> <id> <data_b64> [FIELD <name>] [BLIND]"
description = "Store blind tokens for an entry. In standard mode, data_b64 is base64-encoded plaintext (server tokenizes). With BLIND flag, data_b64 is base64-encoded BlindTokenSet JSON (client pre-tokenized, for E2EE)."
acl = "namespace:write"
parameters = [
    { name = "index", type = "string", required = true, description = "Index name" },
    { name = "id", type = "string", required = true, description = "Entry identifier" },
    { name = "data_b64", type = "string", required = true, description = "Base64-encoded plaintext (standard) or BlindTokenSet JSON (BLIND mode)" },
    { name = "field", type = "string", required = false, description = "JSON field to extract for tokenization (standard mode only)" },
    { name = "blind", type = "flag", required = false, description = "E2EE mode: treat data_b64 as pre-computed blind tokens" },
]
response = { fields = ["status", "id", "version"] }
errors = ["NOTFOUND", "BADARG"]

[commands.DELETE]
syntax = "DELETE <index> <id>"
description = "Remove an entry's blind tokens from the index"
acl = "namespace:write"
parameters = [
    { name = "index", type = "string", required = true, description = "Index name" },
    { name = "id", type = "string", required = true, description = "Entry identifier" },
]
response = { fields = ["status", "id"] }
errors = ["NOTFOUND"]

# ── Search ───────────────────────────────────────────────────────

[commands.SEARCH]
syntax = "SEARCH <index> <query> [MODE exact|contains|prefix|fuzzy] [FIELD <name>] [LIMIT <n>] [BLIND]"
description = "Search a blind index. In standard mode, query is plain text (server tokenizes). With BLIND flag, query is base64-encoded BlindTokenSet JSON (client pre-tokenized, for E2EE)."
acl = "namespace:read"
parameters = [
    { name = "index", type = "string", required = true, description = "Index name" },
    { name = "query", type = "string", required = true, description = "Search query text (standard) or base64-encoded BlindTokenSet JSON (BLIND mode)" },
    { name = "mode", type = "string", required = false, default = "contains", description = "Match mode: exact, contains, prefix, fuzzy" },
    { name = "field", type = "string", required = false, description = "JSON field to extract for tokenization (standard mode only)" },
    { name = "limit", type = "integer", required = false, default = 100, description = "Maximum results to return" },
    { name = "blind", type = "flag", required = false, description = "E2EE mode: treat query as pre-computed blind tokens" },
]
response = { fields = ["status", "scanned", "matched", "results"] }
errors = ["NOTFOUND", "BADARG"]

# ── Operational ──────────────────────────────────────────────────

[commands.HEALTH]
syntax = "HEALTH"
description = "Health check"
acl = "none"
response = { fields = ["status"] }

[commands.PING]
syntax = "PING"
description = "Ping-pong"
acl = "none"
response = { type = "string", value = "PONG" }

[commands.AUTH]
syntax = "AUTH <token>"
description = "Authenticate this connection"
acl = "none"
parameters = [
    { name = "token", type = "string", required = true },
]
response = { fields = ["status"] }
errors = ["DENIED"]

[commands.COMMAND_LIST]
syntax = "COMMAND LIST"
description = "List all supported commands"
acl = "none"
response = { fields = ["count", "commands"] }

[commands.HELLO]
syntax = "HELLO"
description = "Engine identity handshake — returns engine name, version, wire protocol, supported commands, and capability tags. Pre-auth; clients issue this on connect to verify they are talking to the expected engine and version."
acl = "none"
response = { fields = ["engine", "version", "protocol", "commands", "capabilities"] }

# ── Types ────────────────────────────────────────────────────────

[types.SearchHit]
fields = [
    { name = "id", type = "string", description = "Entry identifier" },
    { name = "score", type = "float", description = "Relevance score (0.0–1.0)" },
]

[types.MatchMode]
enum = ["exact", "contains", "prefix", "fuzzy"]
description = "How to match query tokens against stored tokens"
